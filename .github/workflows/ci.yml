name: CI

on:
  push:
    tags:
      - 'v*'
    branches:
      - master
  pull_request:
  workflow_call:

permissions:
  contents: read

jobs:
  test_go:
    name: Go tests
    runs-on: ubuntu-latest
    env:
        PROMU: ./promu-intermediate
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26.x
      - run: go build -o promu-intermediate
      - run: make check_license style unused lint test build
      - run: rm -v promu promu-intermediate
      - run: git diff --exit-code

  build:
    name: Build for common architectures
    runs-on: ubuntu-latest
    env:
        PROMU: ./promu-intermediate
    strategy:
      matrix:
        thread: [ 0, 1, 2, 3]
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - name: Install Go
        uses: actions/setup-go@4a3601121dd01d1626a1e23e37211e3254c1c06c # v6.4.0
        with:
          go-version: 1.26.x
      - run: go build -o promu-intermediate
      - run: ./promu-intermediate crossbuild -v --parallelism 4 --parallelism-thread ${{ matrix.thread }}
      - uses: prometheus/promci-artifacts/save@f9a587dbc0b2c78a0c54f8ad1cde71ea29a4b76f # v0.1.0

  publish_release:
    name: Publish release artifacts
    runs-on: ubuntu-latest
    permissions:
      contents: write
    needs: [test_go, build]
    if: |
      (github.repository == 'prometheus/promu')
      &&
      (github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v'))
    steps:
      - uses: prometheus/promci/publish_release@d9d4f5688814f0b77bf003d07fb8c00507390634 # v0.8.2
        with:
          github_token: ${{ github.token }}
